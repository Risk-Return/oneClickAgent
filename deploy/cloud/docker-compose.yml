version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: iagent
      POSTGRES_USER: iagent
      POSTGRES_PASSWORD: ${IAGENT_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iagent"]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  gateway:
    build: ../../gateway
    ports: ["42080:42080"]
    environment:
      IAGENT_HTTP_ADDR: ":42080"
      IAGENT_DB_URL: "postgres://iagent:${IAGENT_DB_PASSWORD}@postgres:5432/iagent?sslmode=disable"
      IAGENT_JWT_SECRET: "${IAGENT_JWT_SECRET}"
      IAGENT_FILE_STORE: "local:/data/files"
      IAGENT_ENV: "${IAGENT_ENV:-development}"
      IAGENT_LOG_LEVEL: "${IAGENT_LOG_LEVEL:-debug}"
      IAGENT_LOG_FORMAT: "${IAGENT_LOG_FORMAT:-text}"
      IAGENT_CORS_ORIGINS: "${IAGENT_CORS_ORIGINS:-*}"
      IAGENT_QUEUE_TTL: "${IAGENT_QUEUE_TTL:-1h}"
      IAGENT_MAX_QUEUED_PER_USER: "${IAGENT_MAX_QUEUED_PER_USER:-10}"
      IAGENT_CRED_KEY: "${IAGENT_CRED_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - files:/data/files
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  files:
