# Reference docker-compose for cloud gateway + PostgreSQL.
# TLS terminates at reverse proxy in front.
version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: iagent
      POSTGRES_USER: iagent
      POSTGRES_PASSWORD: ${IAGENT_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iagent"]
  gateway:
    build: ../../gateway
    ports: ["8080:8080"]
    environment:
      IAGENT_HTTP_ADDR: ":8080"
      IAGENT_DB_URL: "postgres://iagent:${IAGENT_DB_PASSWORD}@postgres:5432/iagent"
      IAGENT_JWT_SECRET: "${IAGENT_JWT_SECRET}"
      IAGENT_FILE_STORE: "local:/data/files"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - files:/data/files
volumes:
  pgdata:
  files:
